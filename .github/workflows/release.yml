name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: linux
            arch: amd64
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build tmux-overseer
        env:
          GOARCH: ${{ matrix.arch }}
          GOOS: ${{ matrix.os }}
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o tmux-overseer-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/tmux-overseer

      - name: Build claude-hook
        env:
          GOARCH: ${{ matrix.arch }}
          GOOS: ${{ matrix.os }}
        run: |
          go build -trimpath -ldflags '-s -w' \
            -o claude-hook-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/claude-hook

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            tmux-overseer-${{ matrix.os }}-${{ matrix.arch }}
            claude-hook-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tmux-overseer-*
            claude-hook-*
